<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABLES</title>
</head>

<body>
    <table border="black">
        <caption>Food Menu</caption>
        <thead>
            <tr>
                <th rowspan="2">Name</th>
                <th colspan="2">Price</th>
            </tr>
            <tr>

                <td>Nep</td>
                <td>USD</td>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Samonsa</td>
                <td>650</td>
                <td>$5.99</td>
            </tr>
            <tr>
                <td>Pizza</td>
                <td>1500</td>
                <td>$10.99</td>
            </tr>
            <tr>
                <td>Frooti</td>
                <td>288</td>
                <td>$2.88</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
