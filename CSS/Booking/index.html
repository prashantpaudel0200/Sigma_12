<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="container">
            <div class="upper">
                <div class="logo">
                    <span> Booking.com</span>
                </div>
                <div class="items">
                    <div class="group1">
                        <button class="country"><span>NPR</span></button>
                        <button id="flag" class="country"><img src="download.webp"></button>
                        <button class="country"><i class="fa-regular fa-circle-question"></i></button>
                    </div>
                    <div class="group2">
                        <button class="country"><span>List your property</span></button>
                        <button class="login"><span>Register</span></button>
                        <button class="login"><span>Sign in</span></button>
                    </div>
                </div>
            </div>
            <div class="lower">
                <div class="options">

                    <div id="stays"><i class="fa-solid fa-bed"></i>
                        <pre> Stays</pre>
                    </div>
                    <div><i class="fa-solid fa-car"></i>
                        <pre> Car rent</pre>
                    </div>
                    <div><i class="fa-solid fa-landmark"></i>
                        <pre> Attraction</pre>
                    </div>
                    <div><i class="fa-solid fa-taxi"></i>
                        <pre> Taxi</pre>
                    </div>

                </div>
            </div>
        </div>
    </header>
    <script src="https://kit.fontawesome.com/05a3698b97.js" crossorigin="anonymous"></script>
</body>

</html>
