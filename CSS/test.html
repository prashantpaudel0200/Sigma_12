<!DOCTYPE html>
<html>
<head>
    <title>Particles Test</title>

    <style>
        body {
            margin: 0;
        }

        #tsparticles {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(
                135deg,
                #4e9af1,
                #7b61ff
            );
        }
    </style>
</head>
<body>

<div id="tsparticles"></div>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@3/tsparticles.bundle.min.js"></script>

<script>
tsParticles.load({
  id: "tsparticles",
  options: {
    particles: {
      number: {
        value: 80
      },

      color: {
        value: "#ffffff"
      },

      links: {
        enable: true,
        distance: 150,
        color: "#ffffff",
        opacity: 0.3
      },

      move: {
        enable: true,
        speed: 2
      },

      size: {
        value: 4
      }
    },

    interactivity: {
      events: {
        onHover: {
          enable: true,
          mode: "grab"
        }
      },

      modes: {
        grab: {
          distance: 200
        }
      }
    }
  }
});
</script>

</body>
</html>
