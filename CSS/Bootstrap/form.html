<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Demo</title>
    <link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
  <div class="container">
    <h1>Form Demo</h1>
    <form>
        <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input type="text" class="form-control" placeholder="someone@gmail.com" id="email">
        </div>
        <div class="mb-3">
            <label class="form-label" for="password">Password</label>
            <input type="password" class="form-control" placeholder="Password" id="password">
        </div>
        <div class="address mb-3">
            <label class="form-label" for="address">Address</label>
            <select class="form-select" aria-placeholder="Province">
                <option selected>Province</option>
                <option value="1">Koshi</option>
                <option value="2">Madesh</option>
                <option value="3">Bagmati</option>
                <option value="4">Gandaki</option>
                <option value="5">Lumbini</option>
                <option value="6">Karnali</option>
                <option value="7">SudurPaschim</option>
            </select>
        </div>
        <br>
        <button type="button" class="btn btn-light">Submit</button>
    </form>
  </div>
</body>
</html>
